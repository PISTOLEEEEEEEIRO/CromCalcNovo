<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CromCalc 2026</title>
    <style>
        :root { --primary: #FF6B00; --bg: #F8F9FA; --text: #1A1A1A; }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); margin: 0 0 5px 0; font-size: 28px; text-align: center; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #555; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        input { width: 100%; padding: 15px; border: 2px solid #EEE; border-radius: 12px; font-size: 18px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        .input-unit { position: absolute; right: 15px; color: #999; font-weight: 600; }
        .quick-select { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
        .quick-select button { background: #F0F0F0; border: none; padding: 10px; border-radius: 8px; font-weight: 600; color: #555; cursor: pointer; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .quick-select button:active { background: #DDD; transform: scale(0.95); }
        .service-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 20px 0; }
        .service-btn { background: white; border: 2px solid #EEE; padding: 15px 10px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .service-btn.active { background: var(--primary); border-color: var(--primary); color: white; }
        .results-section { background: #FDF2E9; padding: 20px; border-radius: 15px; margin-top: 20px; }
        .info-card { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; color: #666; }
        .info-value { font-weight: 700; color: var(--text); }
        .price-display { text-align: center; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #CCC; }
        .price-label { font-size: 12px; font-weight: 800; color: #999; letter-spacing: 1px; }
        .price-value-wrapper { font-size: 36px; font-weight: 900; color: var(--text); margin: 5px 0; }
        .clear-btn { width: 100%; padding: 15px; margin-top: 20px; border: none; border-radius: 12px; background: #333; color: white; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <div class="app-container">
        <h1>CromCalc <small style="font-size:12px; vertical-align:middle; opacity:0.6">2026</small></h1>

        <div class="input-group">
            <label>Ø Diâmetro (mm)</label>
            <div class="input-wrapper">
                <input type="number" id="diametro" inputmode="decimal" placeholder="0">
                <span class="input-unit">mm</span>
            </div>
            <div class="quick-select">
                <button type="button" onclick="setMedida('diametro', 10)">10</button>
                <button type="button" onclick="setMedida('diametro', 20)">20</button>
                <button type="button" onclick="setMedida('diametro', 30)">30</button>
                <button type="button" onclick="setMedida('diametro', 40)">40</button>
                <button type="button" onclick="setMedida('diametro', 50)">50</button>
                <button type="button" onclick="setMedida('diametro', 60)">60</button>
                <button type="button" onclick="setMedida('diametro', 80)">80</button>
                <button type="button" onclick="setMedida('diametro', 100)">100</button>
            </div>
        </div>

        <div class="input-group">
            <label>ℓ Comprimento (mm)</label>
            <div class="input-wrapper">
                <input type="number" id="comprimento" inputmode="decimal" placeholder="0">
                <span class="input-unit">mm</span>
            </div>
            <div class="quick-select">
                <button type="button" onclick="setMedida('comprimento', 100)">100</button>
                <button type="button" onclick="setMedida('comprimento', 200)">200</button>
                <button type="button" onclick="setMedida('comprimento', 300)">300</button>
                <button type="button" onclick="setMedida('comprimento', 500)">500</button>
                <button type="button" onclick="setMedida('comprimento', 750)">750</button>
                <button type="button" onclick="setMedida('comprimento', 1000)">1000</button>
                <button type="button" onclick="setMedida('comprimento', 1500)">1500</button>
                <button type="button" onclick="setMedida('comprimento', 2000)">2000</button>
            </div>
        </div>

        <div class="service-grid">
            <button class="service-btn active" id="btn-cromoCamada" onclick="setServico('cromoCamada')">Cromo Camada</button>
            <button class="service-btn" id="btn-cromagemCliente" onclick="setServico('cromagemCliente')">Cromagem Cliente</button>
            <button class="service-btn" id="btn-retifica" onclick="setServico('retifica')">Retífica</button>
            <button class="service-btn" id="btn-mecanico" onclick="setServico('mecanico')">Mecânico</button>
        </div>

        <div class="results-section">
            <div class="info-card"><span>Área:</span><span id="res-area">—</span></div>
            <div class="info-card"><span>Faixa:</span><span id="res-faixa">—</span></div>
            <div class="info-card"><span>Valor Base:</span><span id="res-base">—</span></div>
            <div class="price-display">
                <div class="price-label">PREÇO ESTIMADO</div>
                <div class="price-value-wrapper">R$ <span id="res-total">0,00</span></div>
                <div id="res-servico-nome" style="font-size:12px; color:var(--primary); font-weight:700">Cromo Camada</div>
            </div>
        </div>

        <button class="clear-btn" onclick="limpar()">Limpar Tudo</button>
    </div>

    <script>
        const SERVICOS = {
            cromoCamada: { n: 'Cromo Camada', c: (vb) => vb * 2 },
            cromagemCliente: { n: 'Cromagem Cliente', c: (vb) => vb / 0.85 },
            retifica: { n: 'Retífica', c: (vb) => vb * 0.588 },
            mecanico: { n: 'Mecânico', c: (vb) => vb }
        };

        let state = { diametro: 0, comprimento: 0, servico: 'cromoCamada' };

        function setMedida(id, val) {
            document.getElementById(id).value = val;
            atualizar();
        }

        function setServico(s) {
            state.servico = s;
            document.querySelectorAll('.service-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + s).classList.add('active');
            atualizar();
        }

        function atualizar() {
            state.diametro = parseFloat(document.getElementById('diametro').value) || 0;
            state.comprimento = parseFloat(document.getElementById('comprimento').value) || 0;

            const area = (Math.PI * state.diametro * state.comprimento) / 10000;
            let f = 18.2, k = 300, n = 'Faixa 5 (≤10)';

            if (state.diametro > 50) { f = 32.1; k = 0; n = 'Faixa 1 (>50)'; }
            else if (state.diametro > 25) { f = 27.3; k = 35; n = 'Faixa 2 (26-50)'; }
            else if (state.diametro > 15) { f = 24.1; k = 61; n = 'Faixa 3 (16-25)'; }
            else if (state.diametro > 10) { f = 21.5; k = 125; n = 'Faixa 4 (11-15)'; }

            const vb = area > 0 ? (area * f) + k : 0;
            const total = SERVICOS[state.servico].c(vb);

            document.getElementById('res-area').textContent = area > 0 ? area.toLocaleString('pt-BR', {minimumFractionDigits: 4}) + ' dcm²' : '—';
            document.getElementById('res-faixa').textContent = area > 0 ? n : '—';
            document.getElementById('res-base').textContent = area > 0 ? 'R$ ' + vb.toLocaleString('pt-BR', {minimumFractionDigits: 2}) : '—';
            document.getElementById('res-total').textContent = area > 0 ? total.toLocaleString('pt-BR', {minimumFractionDigits: 2}) : '0,00';
            document.getElementById('res-servico-nome').textContent = SERVICOS[state.servico].n;
        }

        function limpar() {
            document.getElementById('diametro').value = '';
            document.getElementById('comprimento').value = '';
            atualizar();
        }

        document.getElementById('diametro').addEventListener('input', atualizar);
        document.getElementById('comprimento').addEventListener('input', atualizar);
    </script>
</body>
</html>
