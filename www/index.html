<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CromCalc 2026</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <div class="logo-section">
                    <div class="logo-icon">
                        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="20" cy="20" r="18" stroke="url(#grad1)" stroke-width="3" fill="none"/>
                            <circle cx="20" cy="20" r="10" stroke="url(#grad1)" stroke-width="2" fill="none" stroke-dasharray="4 3"/>
                            <line x1="20" y1="2" x2="20" y2="38" stroke="url(#grad1)" stroke-width="1.5" opacity="0.4"/>
                            <line x1="2" y1="20" x2="38" y2="20" stroke="url(#grad1)" stroke-width="1.5" opacity="0.4"/>
                            <defs>
                                <linearGradient id="grad1" x1="0" y1="0" x2="40" y2="40">
                                    <stop offset="0%" stop-color="#FF6B00"/>
                                    <stop offset="100%" stop-color="#FF9500"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <div class="logo-text">
                        <h1>CromCalc</h1>
                        <span class="logo-year">2026</span>
                    </div>
                </div>
                <span class="header-subtitle">Megaflex</span>
            </div>
        </header>

        <main class="main-content">
            <section class="input-section">
                <div class="section-label">📐 Dimensões da Peça</div>
                <div class="input-grid">
                    <div class="input-group">
                        <label><span class="input-symbol">Ø</span> Diâmetro</label>
                        <div class="input-wrapper">
                            <input type="number" id="diametro" inputmode="decimal" placeholder="0">
                            <span class="input-unit">mm</span>
                        </div>
                        <div class="quick-select">
                            <button type="button" onclick="setMedida('diametro', 10)">10</button>
                            <button type="button" onclick="setMedida('diametro', 20)">20</button>
                            <button type="button" onclick="setMedida('diametro', 30)">30</button>
                            <button type="button" onclick="setMedida('diametro', 40)">40</button>
                            <button type="button" onclick="setMedida('diametro', 50)">50</button>
                            <button type="button" onclick="setMedida('diametro', 60)">60</button>
                            <button type="button" onclick="setMedida('diametro', 80)">80</button>
                            <button type="button" onclick="setMedida('diametro', 100)">100</button>
                        </div>
                    </div>
                    <div class="input-group">
                        <label><span class="input-symbol">ℓ</span> Comprimento</label>
                        <div class="input-wrapper">
                            <input type="number" id="comprimento" inputmode="decimal" placeholder="0">
                            <span class="input-unit">mm</span>
                        </div>
                        <div class="quick-select">
                            <button type="button" onclick="setMedida('comprimento', 100)">100</button>
                            <button type="button" onclick="setMedida('comprimento', 200)">200</button>
                            <button type="button" onclick="setMedida('comprimento', 300)">300</button>
                            <button type="button" onclick="setMedida('comprimento', 500)">500</button>
                            <button type="button" onclick="setMedida('comprimento', 1000)">1000</button>
                            <button type="button" onclick="setMedida('comprimento', 2000)">2000</button>
                        </div>
                    </div>
                </div>
            </section>

            <section class="service-section">
                <div class="service-grid">
                    <button class="service-btn active" id="btn-cromoCamada" onclick="setServico('cromoCamada')">
                        <span class="service-name">Cromo Camada</span>
                    </button>
                    <button class="service-btn" id="btn-cromagemCliente" onclick="setServico('cromagemCliente')">
                        <span class="service-name">Cromagem Cliente</span>
                    </button>
                    <button class="service-btn" id="btn-retifica" onclick="setServico('retifica')">
                        <span class="service-name">Retífica</span>
                    </button>
                    <button class="service-btn" id="btn-mecanico" onclick="setServico('mecanico')">
                        <span class="service-name">Mecânico</span>
                    </button>
                </div>
            </section>

            <section class="results-section">
                <div class="info-results">
                    <div class="info-card">
                        <span class="info-label">Área</span>
                        <span class="info-value" id="result-area">—</span>
                        <span class="info-unit">dcm²</span>
                    </div>
                    <div class="info-card">
                        <span class="info-label">Faixa</span>
                        <span class="info-value" id="result-faixa">—</span>
                    </div>
                    <div class="info-card">
                        <span class="info-label">Valor Base</span>
                        <span class="info-value" id="result-base">—</span>
                        <span class="info-unit">R$</span>
                    </div>
                </div>
                <div class="price-display">
                    <span class="price-label">PREÇO FINAL</span>
                    <div class="price-value-wrapper">
                        <span class="price-currency">R$</span>
                        <span class="price-value" id="result-preco">0,00</span>
                    </div>
                    <span class="price-service-label" id="price-service-label">Cromo Camada</span>
                </div>
            </section>

            <button class="clear-btn" onclick="limparTudo()">
                Limpar / Novo Cálculo
            </button>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
